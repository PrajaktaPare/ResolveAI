# ─────────────────────────────────────────────────────────
#  ResolveAI — Google Cloud Build Pipeline
#  Builds & deploys both backend and frontend to Cloud Run
# ─────────────────────────────────────────────────────────

steps:
  # ── Step 1: Build Backend Docker Image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/resolveai-backend:$SHORT_SHA",
        "-t",
        "gcr.io/$PROJECT_ID/resolveai-backend:latest",
        "./backend",
      ]

  # ── Step 2: Push Backend Image to GCR ──
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/resolveai-backend:$SHORT_SHA"]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/resolveai-backend:latest"]

  # ── Step 3: Deploy Backend to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "resolveai-backend"
      - "--image=gcr.io/$PROJECT_ID/resolveai-backend:$SHORT_SHA"
      - "--region=asia-south1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=3"

  # ── Step 4: Build Frontend Docker Image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/resolveai-frontend:$SHORT_SHA",
        "-t",
        "gcr.io/$PROJECT_ID/resolveai-frontend:latest",
        "--build-arg",
        "VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}",
        "--build-arg",
        "VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}",
        "--build-arg",
        "VITE_API_BASE_URL=${_VITE_API_BASE_URL}",
        "./frontend",
      ]

  # ── Step 5: Push Frontend Image to GCR ──
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/resolveai-frontend:$SHORT_SHA"]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/resolveai-frontend:latest"]

  # ── Step 6: Deploy Frontend to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "resolveai-frontend"
      - "--image=gcr.io/$PROJECT_ID/resolveai-frontend:$SHORT_SHA"
      - "--region=asia-south1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=3"

# Container images to store in GCR
images:
  - "gcr.io/$PROJECT_ID/resolveai-backend:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/resolveai-backend:latest"
  - "gcr.io/$PROJECT_ID/resolveai-frontend:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/resolveai-frontend:latest"

# Substitution variables (set during build trigger or manually)
substitutions:
  _VITE_SUPABASE_URL: "https://ezmafjrrogdbbxjnvgct.supabase.co"
  _VITE_SUPABASE_ANON_KEY: "sb_publishable_xWJqHllXyLvrfuCkF1w88g_P9xBr0RJ"
  _VITE_API_BASE_URL: "https://resolveai-backend-REPLACE_THIS.a.run.app/api"

# Build timeout (10 minutes)
timeout: "600s"
